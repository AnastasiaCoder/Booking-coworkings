version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    ports:
      - "5000:5000"
      - "5678:5678"  # Debug port
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/coworking
      - FLASK_APP=app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./backend/migrations:/app/migrations
      - ./backend/logs:/app/logs
      - ./backend/config:/app/config
    networks:
      - app-network

  test:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/coworking_test
      - FLASK_APP=app
      - FLASK_ENV=testing
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./backend/migrations:/app/migrations
    networks:
      - app-network
    command: bash -c "chmod +x run-tests.sh && ./run-tests.sh"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    ports:
      - "3000:3000"
      - "9229:9229"  # Debug port
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./frontend/.env:/app/.env
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=coworking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - app-network

volumes:
  postgres_data:
  pgadmin-data:

networks:
  app-network:
    driver: bridge 